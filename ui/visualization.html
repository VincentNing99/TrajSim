<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrajSim — Trajectory Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: 'Courier New', monospace; color: #e0e0e0; overflow: hidden; }
    canvas { display: block; }

    /* ── Load screen ── */
    #load-screen {
      position: fixed; inset: 0; background: #060612;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      z-index: 100;
    }
    #load-screen h1 { font-size: 26px; color: #6aa9f0; letter-spacing: 6px; text-transform: uppercase; }
    #load-screen p  { color: #444; font-size: 12px; letter-spacing: 1px; }
    #load-btn {
      padding: 11px 36px; background: transparent;
      border: 1px solid #6aa9f0; color: #6aa9f0;
      font-family: inherit; font-size: 13px; cursor: pointer;
      letter-spacing: 3px; text-transform: uppercase; transition: background 0.2s;
    }
    #load-btn:hover { background: rgba(106,169,240,0.1); }

    /* ── Telemetry panel ── */
    #telemetry {
      position: fixed; top: 20px; right: 20px;
      background: rgba(0,0,0,0.72); border: 1px solid #222;
      padding: 14px 18px; font-size: 12px; line-height: 2.0;
      min-width: 210px; display: none;
    }
    .t-section { color: #555; font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
                 border-bottom: 1px solid #1a1a1a; padding-bottom: 4px; margin-bottom: 2px; }
    .t-row { display: flex; justify-content: space-between; gap: 12px; }
    .t-lbl { color: #555; }
    .t-val { color: #6aa9f0; }
    .t-val-orbit { color: #44ffcc; }

    /* ── Controls bar ── */
    #controls {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.72); border: 1px solid #222;
      padding: 12px 20px; display: none; align-items: center; gap: 14px;
    }
    #flight-ctrls, #orbit-ctrls { display: flex; align-items: center; gap: 14px; }
    .btn {
      background: transparent; border: 1px solid #444; color: #999;
      font-family: inherit; font-size: 12px; padding: 5px 14px;
      cursor: pointer; letter-spacing: 1px; transition: all 0.15s;
    }
    .btn:hover    { border-color: #6aa9f0; color: #6aa9f0; }
    .btn.on       { border-color: #6aa9f0; color: #6aa9f0; }
    .btn.orbit-on { border-color: #44ffcc; color: #44ffcc; }
    .btn:hover.orbit-on { border-color: #44ffcc; color: #44ffcc; }
    #timeline {
      width: 280px; -webkit-appearance: none; height: 2px;
      background: #2a2a2a; outline: none; cursor: pointer;
    }
    #timeline::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      background: #6aa9f0; border-radius: 50%; cursor: pointer;
    }
    #orbit-timeline {
      width: 280px; -webkit-appearance: none; height: 2px;
      background: #1a2a1a; outline: none; cursor: pointer;
    }
    #orbit-timeline::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      background: #44ffcc; border-radius: 50%; cursor: pointer;
    }
    #t-elapsed       { color: #6aa9f0; font-size: 12px; min-width: 80px; }
    #orbit-nu-display { color: #44ffcc; font-size: 12px; min-width: 80px; }
  </style>
</head>
<body>

<!-- Load screen -->
<div id="load-screen">
  <h1>TrajSim</h1>
  <p>Trajectory Simulation Visualizer</p>
  <button id="load-btn" onclick="document.getElementById('file-input').click()">
    Load Telemetry CSV
  </button>
  <input type="file" id="file-input" accept=".csv" style="display:none">
  <p style="margin-top:4px;font-size:11px;">Load output/telemetry.csv from the TrajSim build</p>
</div>

<!-- Telemetry overlay -->
<div id="telemetry">
  <div class="t-section" style="margin-bottom:6px;" id="telem-flight-header">Flight</div>
  <div id="flight-telem">
    <div class="t-row"><span class="t-lbl">T+</span>   <span class="t-val" id="d-time">—</span></div>
    <div class="t-row"><span class="t-lbl">Alt</span>  <span class="t-val" id="d-alt">—</span></div>
    <div class="t-row"><span class="t-lbl">|V|</span>  <span class="t-val" id="d-vel">—</span></div>
    <div class="t-row"><span class="t-lbl">Mass</span> <span class="t-val" id="d-mass">—</span></div>
    <div class="t-row"><span class="t-lbl">TGO</span>  <span class="t-val" id="d-tgo">—</span></div>
  </div>
  <div class="t-section" style="margin-top:8px;margin-bottom:6px;">Orbit</div>
  <div class="t-row"><span class="t-lbl">SMA</span>  <span class="t-val" id="d-sma">—</span></div>
  <div class="t-row"><span class="t-lbl">Ecc</span>  <span class="t-val" id="d-ecc">—</span></div>
  <div class="t-row"><span class="t-lbl">Inc</span>  <span class="t-val" id="d-inc">—</span></div>
  <!-- Orbit position telemetry (orbit view only) -->
  <div id="orbit-telem" style="display:none">
    <div class="t-section" style="margin-top:8px;margin-bottom:6px;color:#33aa88;border-color:#1a2a1a;">Position</div>
    <div class="t-row"><span class="t-lbl">ν</span>      <span class="t-val-orbit" id="d-nu">—</span></div>
    <div class="t-row"><span class="t-lbl">Alt</span>    <span class="t-val-orbit" id="d-orb-alt">—</span></div>
    <div class="t-row"><span class="t-lbl">|V|</span>    <span class="t-val-orbit" id="d-orb-vel">—</span></div>
    <div class="t-row"><span class="t-lbl">Period</span> <span class="t-val-orbit" id="d-period">—</span></div>
  </div>
</div>

<!-- Playback controls -->
<div id="controls">
  <!-- Flight mode controls -->
  <div id="flight-ctrls">
    <button class="btn on" id="btn-play" onclick="togglePlay()">▶ PLAY</button>
    <button class="btn"    onclick="resetAnim()">↺ RESET</button>
    <input  type="range" id="timeline" min="0" max="1" step="0.0005" value="0"
            oninput="scrub(+this.value)">
    <div id="t-elapsed">T+0.0 s</div>
    <button class="btn"    id="sp1"  onclick="setSpeed(1)">1×</button>
    <button class="btn"    id="sp10" onclick="setSpeed(10)">10×</button>
    <button class="btn on" id="sp50" onclick="setSpeed(50)">50×</button>
    <button class="btn"    id="btn-orbit-view" onclick="enterOrbitView()">⊙ ORBIT</button>
  </div>
  <!-- Orbit mode controls (hidden by default) -->
  <div id="orbit-ctrls" style="display:none">
    <button class="btn orbit-on" id="btn-orb-play" onclick="toggleOrbitPlay()">▶ PLAY</button>
    <button class="btn"          onclick="resetOrbitAnim()">↺ RESET</button>
    <input  type="range" id="orbit-timeline" min="0" max="1" step="0.0001" value="0"
            oninput="scrubOrbit(+this.value)">
    <div id="orbit-nu-display">ν = 0.0°</div>
    <button class="btn"          id="osp50"  onclick="setOrbitSpeed(50)">50×</button>
    <button class="btn orbit-on" id="osp100" onclick="setOrbitSpeed(100)">100×</button>
    <button class="btn"          id="osp500" onclick="setOrbitSpeed(500)">500×</button>
    <button class="btn"          onclick="exitOrbitView()">✕ FLIGHT</button>
  </div>
</div>

<!-- Three.js r128 — last version with examples/js/ (non-module) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ============================================================
// Mission parameters  (MISSION_1 — edit for other missions)
// ============================================================
const MISSION = {
  aimingAzimuth:       191.47506 * Math.PI / 180,
  latitude:             40.80768 * Math.PI / 180,
  geocentricLatitude:   40.61741 * Math.PI / 180,
  heightLaunchSite:     1000.0,   // [m]
  launchSiteLongitude: 100.13805 * Math.PI / 180,
};

// ============================================================
// Constants
// ============================================================
const EARTH_A        = 6378137.0;
const EARTH_B        = 6356752.314;
const EARTH_R_MEAN   = 6371000.0;
const EARTH_ROT_RATE = 7.2921150e-5;  // [rad/s]
const SCALE          = 1e-6;          // m → Three.js units  (1 unit = 1000 km)
const MU             = 3.986004418e14; // Earth GM [m³/s²]

// ============================================================
// Coordinate transform:  local launch frame → ECI → Three.js
// ============================================================
let gLP, gRM;

function initTransform() {
  const lat   = MISSION.latitude;
  const latGc = MISSION.geocentricLatitude;
  const az    = MISSION.aimingAzimuth;
  const h     = MISSION.heightLaunchSite;

  const sinGc = Math.sin(latGc), cosGc = Math.cos(latGc);
  const R = EARTH_A * EARTH_B /
            Math.sqrt(EARTH_A*EARTH_A*sinGc*sinGc + EARTH_B*EARTH_B*cosGc*cosGc) + h;

  const dLat = lat - latGc;
  gLP = {
    x: -R * Math.sin(dLat) * Math.cos(az),
    y:  R * Math.cos(dLat),
    z:  R * Math.sin(az) * Math.sin(dLat),
  };

  const cosAz = Math.cos(az), sinAz = Math.sin(az);
  const cosLat = Math.cos(lat), sinLat = Math.sin(lat);

  // Row-major 3×3:  local frame → equatorial ECI
  gRM = [
    -cosAz*sinLat,  cosLat,  sinAz*sinLat,
     sinAz,         0,       cosAz,
     cosAz*cosLat,  sinLat, -sinAz*cosLat,
  ];
}

function localToThree(lx, ly, lz) {
  const fx = lx + gLP.x, fy = ly + gLP.y, fz = lz + gLP.z;
  const ex = gRM[0]*fx + gRM[1]*fy + gRM[2]*fz;  // ECI-X
  const ey = gRM[3]*fx + gRM[4]*fy + gRM[5]*fz;  // ECI-Y
  const ez = gRM[6]*fx + gRM[7]*fy + gRM[8]*fz;  // ECI-Z (north pole)
  return new THREE.Vector3(ex * SCALE, ez * SCALE, ey * SCALE);
}

// Local position → ECI (with launch-site offset), returns {x,y,z} in metres
function localPosToECI(lx, ly, lz) {
  const fx = lx + gLP.x, fy = ly + gLP.y, fz = lz + gLP.z;
  return {
    x: gRM[0]*fx + gRM[1]*fy + gRM[2]*fz,
    y: gRM[3]*fx + gRM[4]*fy + gRM[5]*fz,
    z: gRM[6]*fx + gRM[7]*fy + gRM[8]*fz,
  };
}

// Local velocity → ECI (rotation only, no offset)
function localVelToECI(lx, ly, lz) {
  return {
    x: gRM[0]*lx + gRM[1]*ly + gRM[2]*lz,
    y: gRM[3]*lx + gRM[4]*ly + gRM[5]*lz,
    z: gRM[6]*lx + gRM[7]*ly + gRM[8]*lz,
  };
}

// ECI coords → Three.js Vector3 (same axis remap as localToThree)
function eciToThree(ex, ey, ez) {
  return new THREE.Vector3(ex * SCALE, ez * SCALE, ey * SCALE);
}

// ============================================================
// Renderer / scene
// ============================================================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.01, 1000);
camera.position.set(12, 6, 18);

const orbit = new THREE.OrbitControls(camera, renderer.domElement);
orbit.enableDamping = true;
orbit.dampingFactor = 0.06;
orbit.minDistance = 7.5;
orbit.maxDistance = 80;
orbit.target.set(0, 0, 0);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Stars ──
const starVerts = [];
for (let i = 0; i < 12000; i++) {
  const th = Math.random() * 2 * Math.PI;
  const ph = Math.acos(2 * Math.random() - 1);
  const r  = 450 + Math.random() * 80;
  starVerts.push(r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph));
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.3 })));

// ── Lighting ──
const sunLight = new THREE.DirectionalLight(0xffffff, 1.6);
sunLight.position.set(40, 15, 25);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x112233, 1.2));

// ── Earth ──
const earthGeo = new THREE.SphereGeometry(EARTH_R_MEAN * SCALE, 72, 72);
const earthMat = new THREE.MeshPhongMaterial({
  color: 0x1a44aa,
  specular: new THREE.Color(0x222222),
  shininess: 12,
});
const earth = new THREE.Mesh(earthGeo, earthMat);
earth.rotation.y = -MISSION.launchSiteLongitude;
scene.add(earth);

const texLoader = new THREE.TextureLoader();
const TEX_BASE = 'https://threejs.org/examples/textures/planets/';
texLoader.load(TEX_BASE + 'earth_atmos_2048.jpg',
  (t) => { earthMat.map = t; earthMat.needsUpdate = true; });
texLoader.load(TEX_BASE + 'earth_specular_2048.jpg',
  (t) => { earthMat.specularMap = t; earthMat.needsUpdate = true; });

// ── Atmosphere glow ──
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(EARTH_R_MEAN * SCALE * 1.018, 64, 32),
  new THREE.MeshPhongMaterial({
    color: 0x3366ff, transparent: true, opacity: 0.07,
    side: THREE.FrontSide, depthWrite: false, blending: THREE.AdditiveBlending,
  })
));

// ============================================================
// Flight telemetry state
// ============================================================
let rows      = [];   // number[][] — parsed CSV rows
let cols      = {};   // column name → index
let tPoints   = [];   // THREE.Vector3[] in Three.js units
let playing   = false;
let simSpeed  = 50;
let curIdx    = 0;
let prevWall  = null;
let earthBaseRot = 0;

// ── Flight rocket marker ──
const markerMesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.06, 12, 12),
  new THREE.MeshBasicMaterial({ color: 0xff3333 })
);
markerMesh.visible = false;
scene.add(markerMesh);

// ── Trajectory tube ──
let trajMesh = null;

function buildTrajectory() {
  if (trajMesh) {
    scene.remove(trajMesh);
    trajMesh.geometry.dispose();
    trajMesh.material.dispose();
    trajMesh = null;
  }

  const curve   = new THREE.CatmullRomCurve3(tPoints);
  const tubeGeo = new THREE.TubeGeometry(curve, 500, 0.014, 6, false);
  const tubeMat = new THREE.MeshPhongMaterial({
    color:    0x3388ff,
    emissive: 0x112299,
    transparent: true,
    opacity:  0.85,
  });
  trajMesh = new THREE.Mesh(tubeGeo, tubeMat);
  scene.add(trajMesh);
}

// ============================================================
// CSV parsing
// ============================================================
document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    parseCSV(ev.target.result);
    document.getElementById('load-screen').style.display = 'none';
    document.getElementById('telemetry').style.display   = 'block';
    document.getElementById('controls').style.display    = 'flex';
    markerMesh.visible = true;
    resetAnim();
    focusCamera();
  };
  reader.readAsText(file);
});

function parseCSV(text) {
  initTransform();
  const lines  = text.trim().split('\n');
  const header = lines[0].split(',');
  const idx = (name) => header.indexOf(name);

  cols = {
    time: idx('time'),
    px: idx('pos_x'), py: idx('pos_y'), pz: idx('pos_z'),
    vx: idx('vel_x'), vy: idx('vel_y'), vz: idx('vel_z'),
    mass: idx('mass'), alt: idx('altitude'), tgo: idx('time_to_go'),
    sma: idx('sma'), ecc: idx('eccentricity'), inc: idx('inclination_deg'),
  };

  rows = []; tPoints = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const v = lines[i].split(',').map(Number);
    rows.push(v);
    tPoints.push(localToThree(v[cols.px], v[cols.py], v[cols.pz]));
  }

  buildTrajectory();
}

function focusCamera() {
  const mid  = tPoints[Math.floor(tPoints.length / 2)];
  const dir  = mid.clone().normalize();
  const dist = mid.length() * 2.5;
  const perp = new THREE.Vector3().crossVectors(dir, new THREE.Vector3(0, 1, 0)).normalize();
  camera.position.copy(dir.multiplyScalar(dist)).addScaledVector(perp, dist * 0.3);
  camera.lookAt(0, 0, 0);
  orbit.update();
}

// ============================================================
// Flight playback controls
// ============================================================
function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('btn-play');
  btn.textContent = playing ? '⏸ PAUSE' : '▶ PLAY';
  btn.className   = playing ? 'btn on' : 'btn';
  if (playing) prevWall = performance.now();
}

function resetAnim() {
  playing      = false;
  curIdx       = 0;
  earthBaseRot = 0;
  earth.rotation.y = -MISSION.launchSiteLongitude;
  document.getElementById('btn-play').textContent = '▶ PLAY';
  document.getElementById('btn-play').className   = 'btn on';
  document.getElementById('timeline').value       = 0;
  refreshDisplay();
}

function scrub(val) {
  playing = false;
  curIdx  = val * (rows.length - 1);
  document.getElementById('btn-play').textContent = '▶ PLAY';
  document.getElementById('btn-play').className   = 'btn on';
  refreshDisplay();
}

function setSpeed(s) {
  simSpeed = s;
  ['sp1','sp10','sp50'].forEach(id => document.getElementById(id).className = 'btn');
  document.getElementById('sp' + s).className = 'btn on';
}

// ============================================================
// Telemetry display + flight marker
// ============================================================
function refreshDisplay() {
  if (!rows.length) return;
  const i  = Math.max(0, Math.min(rows.length - 1, Math.floor(curIdx)));
  const i1 = Math.min(i + 1, rows.length - 1);
  const f  = curIdx - i;
  const r  = rows[i];
  const c  = cols;

  const elapsed = r[c.time] - rows[0][c.time];
  const velMag  = Math.sqrt(r[c.vx]**2 + r[c.vy]**2 + r[c.vz]**2);

  document.getElementById('d-time').textContent  = `T+${elapsed.toFixed(1)} s`;
  document.getElementById('d-alt').textContent   = `${(r[c.alt]/1000).toFixed(1)} km`;
  document.getElementById('d-vel').textContent   = `${(velMag/1000).toFixed(3)} km/s`;
  document.getElementById('d-mass').textContent  = `${r[c.mass].toFixed(1)} kg`;
  document.getElementById('d-tgo').textContent   = `${r[c.tgo].toFixed(1)} s`;
  document.getElementById('d-sma').textContent   = `${(r[c.sma]/1000).toFixed(1)} km`;
  document.getElementById('d-ecc').textContent   = r[c.ecc].toFixed(6);
  document.getElementById('d-inc').textContent   = `${r[c.inc].toFixed(4)}°`;
  document.getElementById('t-elapsed').textContent = `T+${elapsed.toFixed(1)} s`;
  document.getElementById('timeline').value         = i / (rows.length - 1);

  if (tPoints.length > i1) {
    markerMesh.position.lerpVectors(tPoints[i], tPoints[i1], f);
  }
}

// ============================================================
// Orbital mechanics
// ============================================================

// Compute full Keplerian elements from ECI state vectors (metres, m/s)
function computeOrbitElements(r, v) {
  const rMag = Math.sqrt(r.x*r.x + r.y*r.y + r.z*r.z);
  const vMag = Math.sqrt(v.x*v.x + v.y*v.y + v.z*v.z);

  // Angular momentum h = r × v
  const hx = r.y*v.z - r.z*v.y;
  const hy = r.z*v.x - r.x*v.z;
  const hz = r.x*v.y - r.y*v.x;
  const hMag = Math.sqrt(hx*hx + hy*hy + hz*hz);

  // Eccentricity vector e = (v × h)/μ − r̂
  const vhx = v.y*hz - v.z*hy;
  const vhy = v.z*hx - v.x*hz;
  const vhz = v.x*hy - v.y*hx;
  const ex = vhx/MU - r.x/rMag;
  const ey = vhy/MU - r.y/rMag;
  const ez = vhz/MU - r.z/rMag;
  const ecc = Math.sqrt(ex*ex + ey*ey + ez*ez);

  // Semi-major axis:  ε = v²/2 − μ/r,  a = −μ/(2ε)
  const eps = vMag*vMag/2 - MU/rMag;
  const a   = -MU / (2*eps);

  // Inclination
  const inc = Math.acos(Math.max(-1, Math.min(1, hz / hMag)));

  // Ascending-node vector n = k × h  (k = [0,0,1])
  const nx = -hy, ny = hx;   // nz = 0
  const nMag = Math.sqrt(nx*nx + ny*ny);

  // RAAN Ω
  let raan = 0;
  if (nMag > 1e-10) {
    raan = Math.acos(Math.max(-1, Math.min(1, nx / nMag)));
    if (ny < 0) raan = 2*Math.PI - raan;
  }

  // Argument of periapsis ω
  let aop = 0;
  if (nMag > 1e-10 && ecc > 1e-10) {
    const nDotE = nx*ex + ny*ey;   // nz = 0
    aop = Math.acos(Math.max(-1, Math.min(1, nDotE / (nMag * ecc))));
    if (ez < 0) aop = 2*Math.PI - aop;
  }

  // True anomaly ν at terminal state
  let nu = 0;
  if (ecc > 1e-10) {
    const eDotR = ex*r.x + ey*r.y + ez*r.z;
    nu = Math.acos(Math.max(-1, Math.min(1, eDotR / (ecc * rMag))));
    const rDotV = r.x*v.x + r.y*v.y + r.z*v.z;
    if (rDotV < 0) nu = 2*Math.PI - nu;
  }

  // Orbital period
  const T = 2*Math.PI * Math.sqrt(a*a*a / MU);

  return { a, ecc, inc, raan, aop, nu, T };
}

// Three.js point on orbit at true anomaly ν
function orbitPointAtNu(orb, nu) {
  const p = orb.a * (1 - orb.ecc * orb.ecc);
  const r = p / (1 + orb.ecc * Math.cos(nu));
  const P = r * Math.cos(nu);
  const Q = r * Math.sin(nu);

  // Perifocal → ECI via R(Ω, i, ω)
  const cO = Math.cos(orb.raan), sO = Math.sin(orb.raan);
  const ci = Math.cos(orb.inc),  si = Math.sin(orb.inc);
  const cw = Math.cos(orb.aop),  sw = Math.sin(orb.aop);

  const ex = (cO*cw - sO*sw*ci)*P + (-cO*sw - sO*cw*ci)*Q;
  const ey = (sO*cw + cO*sw*ci)*P + (-sO*sw + cO*cw*ci)*Q;
  const ez = (sw*si)*P + (cw*si)*Q;

  return eciToThree(ex, ey, ez);
}

// True anomaly → time since periapsis [s]
function nuToTimeSincePeriapsis(nu, orb) {
  const E = 2 * Math.atan2(
    Math.sqrt(1 - orb.ecc) * Math.sin(nu / 2),
    Math.sqrt(1 + orb.ecc) * Math.cos(nu / 2)
  );
  let M = E - orb.ecc * Math.sin(E);
  if (M < 0) M += 2 * Math.PI;
  return (M / (2 * Math.PI)) * orb.T;
}

// Newton's method for Kepler's equation M = E − e·sin(E)
function solveKepler(M, ecc) {
  let E = M;
  for (let i = 0; i < 100; i++) {
    const dE = (M - E + ecc * Math.sin(E)) / (1 - ecc * Math.cos(E));
    E += dE;
    if (Math.abs(dE) < 1e-10) break;
  }
  return E;
}

// Time since periapsis → true anomaly
function timeSincePeriapsisToNu(t, orb) {
  const n  = 2 * Math.PI / orb.T;
  let   M  = (n * t) % (2 * Math.PI);
  if (M < 0) M += 2 * Math.PI;
  const E  = solveKepler(M, orb.ecc);
  let   nu = 2 * Math.atan2(
    Math.sqrt(1 + orb.ecc) * Math.sin(E / 2),
    Math.sqrt(1 - orb.ecc) * Math.cos(E / 2)
  );
  if (nu < 0) nu += 2 * Math.PI;
  return nu;
}

// ============================================================
// Orbit view state
// ============================================================
let orbitMode    = false;
let termOrbit    = null;   // computed Keplerian elements
let orbitMesh    = null;   // THREE.Line — orbit ellipse
let orbitMarker  = null;   // THREE.Mesh — orbit vehicle dot
let orbitT       = 0;      // seconds since periapsis (current position)
let orbitPlaying = false;
let orbitSpeed   = 100;
let orbitPrevWall = null;

// Build the orbit ellipse as a 720-segment line loop
function buildOrbitMesh(orb) {
  if (orbitMesh) {
    scene.remove(orbitMesh);
    orbitMesh.geometry.dispose();
    orbitMesh.material.dispose();
    orbitMesh = null;
  }
  const pts = [];
  const N   = 720;
  for (let i = 0; i <= N; i++) {
    pts.push(orbitPointAtNu(orb, (i / N) * 2 * Math.PI));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color: 0x44ffcc, transparent: true, opacity: 0.7 });
  orbitMesh = new THREE.Line(geo, mat);
  scene.add(orbitMesh);
}

function formatPeriod(T) {
  const m = Math.floor(T / 60);
  const s = Math.round(T % 60);
  return `${m}m ${s}s`;
}

// ── Enter orbit view ──
function enterOrbitView() {
  if (!rows.length) return;

  // Stop flight playback
  playing = false;
  document.getElementById('btn-play').textContent = '▶ PLAY';
  document.getElementById('btn-play').className   = 'btn on';

  // Compute orbital elements from terminal (last) state
  const last = rows[rows.length - 1];
  const rECI = localPosToECI(last[cols.px], last[cols.py], last[cols.pz]);
  const vECI = localVelToECI(last[cols.vx], last[cols.vy], last[cols.vz]);
  termOrbit = computeOrbitElements(rECI, vECI);

  // Start at terminal true anomaly
  orbitT = nuToTimeSincePeriapsis(termOrbit.nu, termOrbit);
  orbitPlaying = false;

  // Build orbit ellipse
  buildOrbitMesh(termOrbit);

  // Create orbit marker (cyan, slightly larger than flight marker)
  if (!orbitMarker) {
    orbitMarker = new THREE.Mesh(
      new THREE.SphereGeometry(0.07, 12, 12),
      new THREE.MeshBasicMaterial({ color: 0x44ffcc })
    );
    scene.add(orbitMarker);
  }
  orbitMarker.visible = true;

  // Dim trajectory tube
  if (trajMesh) trajMesh.material.opacity = 0.18;

  // Swap controls
  orbitMode = true;
  document.getElementById('flight-ctrls').style.display = 'none';
  document.getElementById('orbit-ctrls').style.display  = 'flex';

  // Swap telemetry
  document.getElementById('flight-telem').style.display = 'none';
  document.getElementById('orbit-telem').style.display  = 'block';
  document.getElementById('telem-flight-header').style.display = 'none';

  // Fill constant orbital element rows
  document.getElementById('d-sma').textContent = `${(termOrbit.a/1000).toFixed(1)} km`;
  document.getElementById('d-ecc').textContent = termOrbit.ecc.toFixed(6);
  document.getElementById('d-inc').textContent = `${(termOrbit.inc * 180 / Math.PI).toFixed(4)}°`;
  document.getElementById('d-period').textContent = formatPeriod(termOrbit.T);

  // Zoom to show full orbit
  focusOrbitCamera(termOrbit);

  refreshOrbitDisplay();
}

// ── Exit orbit view ──
function exitOrbitView() {
  orbitMode    = false;
  orbitPlaying = false;

  // Remove orbit ellipse
  if (orbitMesh) {
    scene.remove(orbitMesh);
    orbitMesh.geometry.dispose();
    orbitMesh.material.dispose();
    orbitMesh = null;
  }
  if (orbitMarker) orbitMarker.visible = false;

  // Restore trajectory tube
  if (trajMesh) trajMesh.material.opacity = 0.85;

  // Swap controls back
  document.getElementById('orbit-ctrls').style.display  = 'none';
  document.getElementById('flight-ctrls').style.display = 'flex';

  // Swap telemetry back
  document.getElementById('orbit-telem').style.display  = 'none';
  document.getElementById('flight-telem').style.display = 'block';
  document.getElementById('telem-flight-header').style.display = 'block';

  refreshDisplay();
}

function focusOrbitCamera(orb) {
  const aU = orb.a * SCALE;  // semi-major axis in Three.js units
  camera.position.set(aU * 2.2, aU * 1.2, aU * 2.0);
  camera.lookAt(0, 0, 0);
  orbit.update();
}

// ── Orbit playback controls ──
function toggleOrbitPlay() {
  orbitPlaying = !orbitPlaying;
  const btn = document.getElementById('btn-orb-play');
  btn.textContent = orbitPlaying ? '⏸ PAUSE' : '▶ PLAY';
  if (orbitPlaying) orbitPrevWall = performance.now();
}

function resetOrbitAnim() {
  orbitPlaying = false;
  document.getElementById('btn-orb-play').textContent = '▶ PLAY';
  if (termOrbit) {
    orbitT = nuToTimeSincePeriapsis(termOrbit.nu, termOrbit);
    refreshOrbitDisplay();
  }
}

function scrubOrbit(val) {
  orbitPlaying = false;
  document.getElementById('btn-orb-play').textContent = '▶ PLAY';
  if (termOrbit) {
    orbitT = val * termOrbit.T;
    refreshOrbitDisplay();
  }
}

function setOrbitSpeed(s) {
  orbitSpeed = s;
  ['osp50','osp100','osp500'].forEach(id => document.getElementById(id).className = 'btn');
  document.getElementById('osp' + s).className = 'btn orbit-on';
}

// ── Orbit telemetry + marker refresh ──
function refreshOrbitDisplay() {
  if (!termOrbit) return;

  const nu  = timeSincePeriapsisToNu(orbitT, termOrbit);
  const pos = orbitPointAtNu(termOrbit, nu);
  if (orbitMarker) orbitMarker.position.copy(pos);

  // Position stats from orbit equation
  const p   = termOrbit.a * (1 - termOrbit.ecc * termOrbit.ecc);
  const r   = p / (1 + termOrbit.ecc * Math.cos(nu));   // [m]
  const alt = r - EARTH_R_MEAN;                         // [m]
  const v   = Math.sqrt(MU * (2/r - 1/termOrbit.a));   // vis-viva [m/s]

  document.getElementById('d-nu').textContent      = `${(nu * 180 / Math.PI).toFixed(2)}°`;
  document.getElementById('d-orb-alt').textContent = `${(alt/1000).toFixed(1)} km`;
  document.getElementById('d-orb-vel').textContent = `${(v/1000).toFixed(3)} km/s`;

  // Slider and ν label
  const sliderVal = orbitT / termOrbit.T;
  document.getElementById('orbit-timeline').value       = Math.min(1, Math.max(0, sliderVal));
  document.getElementById('orbit-nu-display').textContent = `ν = ${(nu * 180 / Math.PI).toFixed(1)}°`;
}

// ============================================================
// Animation loop
// ============================================================
function animate(wallTime) {
  requestAnimationFrame(animate);

  if (orbitMode) {
    // Orbit animation
    if (orbitPlaying && termOrbit) {
      const wallDt = (wallTime - orbitPrevWall) / 1000;
      orbitPrevWall = wallTime;
      orbitT = (orbitT + wallDt * orbitSpeed) % termOrbit.T;
      // Earth rotates at real rate × speed multiplier
      earthBaseRot    += EARTH_ROT_RATE * wallDt * orbitSpeed;
      earth.rotation.y = -MISSION.launchSiteLongitude + earthBaseRot;
      refreshOrbitDisplay();
    }
  } else {
    // Flight animation
    if (playing && rows.length > 0) {
      const wallDt = (wallTime - prevWall) / 1000;
      prevWall = wallTime;
      const simDt = wallDt * simSpeed;

      const t0  = rows[0][cols.time];
      const t1  = rows[rows.length - 1][cols.time];
      const dur = t1 - t0;
      const tCur = t0 + (curIdx / (rows.length - 1)) * dur;
      const tNew = Math.min(tCur + simDt, t1);
      curIdx = (tNew - t0) / dur * (rows.length - 1);

      earthBaseRot    += EARTH_ROT_RATE * simDt;
      earth.rotation.y = -MISSION.launchSiteLongitude + earthBaseRot;

      if (curIdx >= rows.length - 1) {
        curIdx  = rows.length - 1;
        playing = false;
        document.getElementById('btn-play').textContent = '▶ PLAY';
        document.getElementById('btn-play').className   = 'btn on';
      }

      refreshDisplay();
    }
  }

  orbit.update();
  renderer.render(scene, camera);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
