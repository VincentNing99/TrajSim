<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrajSim — Trajectory Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: 'Courier New', monospace; color: #e0e0e0; overflow: hidden; }
    canvas { display: block; }

    /* ── Load screen ── */
    #load-screen {
      position: fixed; inset: 0; background: #060612;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      z-index: 100;
    }
    #load-screen h1 { font-size: 26px; color: #6aa9f0; letter-spacing: 6px; text-transform: uppercase; }
    #load-screen p  { color: #444; font-size: 12px; letter-spacing: 1px; }
    #load-btn {
      padding: 11px 36px; background: transparent;
      border: 1px solid #6aa9f0; color: #6aa9f0;
      font-family: inherit; font-size: 13px; cursor: pointer;
      letter-spacing: 3px; text-transform: uppercase; transition: background 0.2s;
    }
    #load-btn:hover { background: rgba(106,169,240,0.1); }

    /* ── Telemetry panel ── */
    #telemetry {
      position: fixed; top: 20px; right: 20px;
      background: rgba(0,0,0,0.72); border: 1px solid #222;
      padding: 14px 18px; font-size: 12px; line-height: 2.0;
      min-width: 210px; display: none;
    }
    .t-section { color: #555; font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
                 border-bottom: 1px solid #1a1a1a; padding-bottom: 4px; margin-bottom: 2px; }
    .t-row { display: flex; justify-content: space-between; gap: 12px; }
    .t-lbl { color: #555; }
    .t-val { color: #6aa9f0; }

    /* ── Controls bar ── */
    #controls {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.72); border: 1px solid #222;
      padding: 12px 20px; display: none; align-items: center; gap: 14px;
    }
    .btn {
      background: transparent; border: 1px solid #444; color: #999;
      font-family: inherit; font-size: 12px; padding: 5px 14px;
      cursor: pointer; letter-spacing: 1px; transition: all 0.15s;
    }
    .btn:hover { border-color: #6aa9f0; color: #6aa9f0; }
    .btn.on   { border-color: #6aa9f0; color: #6aa9f0; }
    #timeline {
      width: 280px; -webkit-appearance: none; height: 2px;
      background: #2a2a2a; outline: none; cursor: pointer;
    }
    #timeline::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      background: #6aa9f0; border-radius: 50%; cursor: pointer;
    }
    #t-elapsed { color: #6aa9f0; font-size: 12px; min-width: 80px; }
  </style>
</head>
<body>

<!-- Load screen -->
<div id="load-screen">
  <h1>TrajSim</h1>
  <p>Trajectory Simulation Visualizer</p>
  <button id="load-btn" onclick="document.getElementById('file-input').click()">
    Load Telemetry CSV
  </button>
  <input type="file" id="file-input" accept=".csv" style="display:none">
  <p style="margin-top:4px;font-size:11px;">Load output/telemetry.csv from the TrajSim build</p>
</div>

<!-- Telemetry overlay -->
<div id="telemetry">
  <div class="t-section" style="margin-bottom:6px;">Flight</div>
  <div class="t-row"><span class="t-lbl">T+</span>   <span class="t-val" id="d-time">—</span></div>
  <div class="t-row"><span class="t-lbl">Alt</span>  <span class="t-val" id="d-alt">—</span></div>
  <div class="t-row"><span class="t-lbl">|V|</span>  <span class="t-val" id="d-vel">—</span></div>
  <div class="t-row"><span class="t-lbl">Mass</span> <span class="t-val" id="d-mass">—</span></div>
  <div class="t-row"><span class="t-lbl">TGO</span>  <span class="t-val" id="d-tgo">—</span></div>
  <div class="t-section" style="margin-top:8px;margin-bottom:6px;">Orbit</div>
  <div class="t-row"><span class="t-lbl">SMA</span>  <span class="t-val" id="d-sma">—</span></div>
  <div class="t-row"><span class="t-lbl">Ecc</span>  <span class="t-val" id="d-ecc">—</span></div>
  <div class="t-row"><span class="t-lbl">Inc</span>  <span class="t-val" id="d-inc">—</span></div>
</div>

<!-- Playback controls -->
<div id="controls">
  <button class="btn on" id="btn-play" onclick="togglePlay()">▶ PLAY</button>
  <button class="btn"    onclick="resetAnim()">↺ RESET</button>
  <input  type="range" id="timeline" min="0" max="1" step="0.0005" value="0"
          oninput="scrub(+this.value)">
  <div id="t-elapsed">T+0.0 s</div>
  <button class="btn"    id="sp1"  onclick="setSpeed(1)">1×</button>
  <button class="btn"    id="sp10" onclick="setSpeed(10)">10×</button>
  <button class="btn on" id="sp50" onclick="setSpeed(50)">50×</button>
</div>

<!-- Three.js r128 — last version with examples/js/ (non-module) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ============================================================
// Mission parameters  (MISSION_1 — edit for other missions)
// ============================================================
const MISSION = {
  aimingAzimuth:       191.47506 * Math.PI / 180,
  latitude:             40.80768 * Math.PI / 180,
  geocentricLatitude:   40.61741 * Math.PI / 180,
  heightLaunchSite:     1000.0,   // [m]
  launchSiteLongitude: 100.13805 * Math.PI / 180,
};

// ============================================================
// Constants
// ============================================================
const EARTH_A        = 6378137.0;
const EARTH_B        = 6356752.314;
const EARTH_R_MEAN   = 6371000.0;
const EARTH_ROT_RATE = 7.2921150e-5;  // [rad/s]
const SCALE          = 1e-6;          // m → Three.js units  (1 unit = 1000 km)

// ============================================================
// Coordinate transform:  local launch frame → ECI → Three.js
//
//  Step 1: add launch-site geocentric position (in local frame)
//  Step 2: apply rmLaunchToEquatorial → equatorial (ECI) coords
//  Step 3: remap axes so ECI-Z (north pole) → Three.js Y (up)
//          Three(x, y, z) = ECI(x, z, y)
// ============================================================
let gLP, gRM;

function initTransform() {
  const lat   = MISSION.latitude;
  const latGc = MISSION.geocentricLatitude;
  const az    = MISSION.aimingAzimuth;
  const h     = MISSION.heightLaunchSite;

  const sinGc = Math.sin(latGc), cosGc = Math.cos(latGc);
  const R = EARTH_A * EARTH_B /
            Math.sqrt(EARTH_A*EARTH_A*sinGc*sinGc + EARTH_B*EARTH_B*cosGc*cosGc) + h;

  const dLat = lat - latGc;
  gLP = {
    x: -R * Math.sin(dLat) * Math.cos(az),
    y:  R * Math.cos(dLat),
    z:  R * Math.sin(az) * Math.sin(dLat),
  };

  const cosAz = Math.cos(az), sinAz = Math.sin(az);
  const cosLat = Math.cos(lat), sinLat = Math.sin(lat);

  // Row-major 3×3:  local frame → equatorial ECI
  gRM = [
    -cosAz*sinLat,  cosLat,  sinAz*sinLat,
     sinAz,         0,       cosAz,
     cosAz*cosLat,  sinLat, -sinAz*cosLat,
  ];
}

function localToThree(lx, ly, lz) {
  const fx = lx + gLP.x, fy = ly + gLP.y, fz = lz + gLP.z;
  const ex = gRM[0]*fx + gRM[1]*fy + gRM[2]*fz;  // ECI-X
  const ey = gRM[3]*fx + gRM[4]*fy + gRM[5]*fz;  // ECI-Y
  const ez = gRM[6]*fx + gRM[7]*fy + gRM[8]*fz;  // ECI-Z (north pole)
  return new THREE.Vector3(ex * SCALE, ez * SCALE, ey * SCALE);
}

// ============================================================
// Renderer / scene
// ============================================================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.01, 1000);
camera.position.set(12, 6, 18);

const orbit = new THREE.OrbitControls(camera, renderer.domElement);
orbit.enableDamping = true;
orbit.dampingFactor = 0.06;
orbit.minDistance = 7.5;
orbit.maxDistance = 80;
orbit.target.set(0, 0, 0);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Stars ──
const starVerts = [];
for (let i = 0; i < 12000; i++) {
  const th = Math.random() * 2 * Math.PI;
  const ph = Math.acos(2 * Math.random() - 1);
  const r  = 450 + Math.random() * 80;
  starVerts.push(r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph));
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.3 })));

// ── Lighting ──
const sunLight = new THREE.DirectionalLight(0xffffff, 1.6);
sunLight.position.set(40, 15, 25);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x112233, 1.2));

// ── Earth ──
const earthGeo = new THREE.SphereGeometry(EARTH_R_MEAN * SCALE, 72, 72);
const earthMat = new THREE.MeshPhongMaterial({
  color: 0x1a44aa,           // fallback blue if textures don't load
  specular: new THREE.Color(0x222222),
  shininess: 12,
});
const earth = new THREE.Mesh(earthGeo, earthMat);
// Initial rotation: align launch-site longitude with ECI reference direction
earth.rotation.y = -MISSION.launchSiteLongitude;
scene.add(earth);

// Earth textures — require internet access
const texLoader = new THREE.TextureLoader();
const TEX_BASE = 'https://threejs.org/examples/textures/planets/';
texLoader.load(TEX_BASE + 'earth_atmos_2048.jpg',
  (t) => { earthMat.map = t; earthMat.needsUpdate = true; });
texLoader.load(TEX_BASE + 'earth_specular_2048.jpg',
  (t) => { earthMat.specularMap = t; earthMat.needsUpdate = true; });

// ── Atmosphere glow ──
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(EARTH_R_MEAN * SCALE * 1.018, 64, 32),
  new THREE.MeshPhongMaterial({
    color: 0x3366ff, transparent: true, opacity: 0.07,
    side: THREE.FrontSide, depthWrite: false, blending: THREE.AdditiveBlending,
  })
));

// ============================================================
// Telemetry state
// ============================================================
let rows      = [];   // number[][] — parsed CSV rows
let cols      = {};   // column name → index
let tPoints   = [];   // THREE.Vector3[] in Three.js units
let playing   = false;
let simSpeed  = 50;   // sim seconds per wall-clock second
let curIdx    = 0;    // fractional row index
let prevWall  = null;
let earthBaseRot = 0; // accumulated Earth rotation [rad]

// ── Rocket marker ──
const markerMesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.06, 12, 12),
  new THREE.MeshBasicMaterial({ color: 0xff3333 })
);
markerMesh.visible = false;
scene.add(markerMesh);

// ── Trajectory tube ──
let trajMesh = null;

function buildTrajectory() {
  if (trajMesh) {
    scene.remove(trajMesh);
    trajMesh.geometry.dispose();
    trajMesh.material.dispose();
    trajMesh = null;
  }

  const curve   = new THREE.CatmullRomCurve3(tPoints);
  const tubeGeo = new THREE.TubeGeometry(curve, 500, 0.014, 6, false);
  const tubeMat = new THREE.MeshPhongMaterial({
    color:    0x3388ff,
    emissive: 0x112299,
    transparent: true,
    opacity:  0.85,
  });
  trajMesh = new THREE.Mesh(tubeGeo, tubeMat);
  scene.add(trajMesh);
}

// ============================================================
// CSV parsing
// ============================================================
document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    parseCSV(ev.target.result);
    document.getElementById('load-screen').style.display = 'none';
    document.getElementById('telemetry').style.display   = 'block';
    document.getElementById('controls').style.display    = 'flex';
    markerMesh.visible = true;
    resetAnim();
    focusCamera();
  };
  reader.readAsText(file);
});

function parseCSV(text) {
  initTransform();
  const lines  = text.trim().split('\n');
  const header = lines[0].split(',');
  const idx = (name) => header.indexOf(name);

  cols = {
    time: idx('time'),
    px: idx('pos_x'), py: idx('pos_y'), pz: idx('pos_z'),
    vx: idx('vel_x'), vy: idx('vel_y'), vz: idx('vel_z'),
    mass: idx('mass'), alt: idx('altitude'), tgo: idx('time_to_go'),
    sma: idx('sma'), ecc: idx('eccentricity'), inc: idx('inclination_deg'),
  };

  rows = []; tPoints = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const v = lines[i].split(',').map(Number);
    rows.push(v);
    tPoints.push(localToThree(v[cols.px], v[cols.py], v[cols.pz]));
  }

  buildTrajectory();
}

function focusCamera() {
  // Position camera to see the full trajectory arc and Earth
  const first = tPoints[0];
  const last  = tPoints[tPoints.length - 1];
  const mid   = tPoints[Math.floor(tPoints.length / 2)];

  // Place camera perpendicular to the arc midpoint, at 2.5× its distance
  const dir = mid.clone().normalize();
  const dist = mid.length() * 2.5;
  // Offset slightly sideways so trajectory arc is visible
  const perp = new THREE.Vector3().crossVectors(dir, new THREE.Vector3(0, 1, 0)).normalize();
  camera.position.copy(dir.multiplyScalar(dist)).addScaledVector(perp, dist * 0.3);
  camera.lookAt(0, 0, 0);
  orbit.update();
}

// ============================================================
// Playback controls
// ============================================================
function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('btn-play');
  btn.textContent = playing ? '⏸ PAUSE' : '▶ PLAY';
  btn.className   = playing ? 'btn on' : 'btn';
  if (playing) prevWall = performance.now();
}

function resetAnim() {
  playing      = false;
  curIdx       = 0;
  earthBaseRot = 0;
  earth.rotation.y = -MISSION.launchSiteLongitude;
  document.getElementById('btn-play').textContent = '▶ PLAY';
  document.getElementById('btn-play').className   = 'btn on';
  document.getElementById('timeline').value       = 0;
  refreshDisplay();
}

function scrub(val) {
  playing = false;
  curIdx  = val * (rows.length - 1);
  document.getElementById('btn-play').textContent = '▶ PLAY';
  document.getElementById('btn-play').className   = 'btn on';
  refreshDisplay();
}

function setSpeed(s) {
  simSpeed = s;
  ['sp1','sp10','sp50'].forEach(id => document.getElementById(id).className = 'btn');
  document.getElementById('sp' + s).className = 'btn on';
}

// ============================================================
// Telemetry display + marker
// ============================================================
function refreshDisplay() {
  if (!rows.length) return;
  const i  = Math.max(0, Math.min(rows.length - 1, Math.floor(curIdx)));
  const i1 = Math.min(i + 1, rows.length - 1);
  const f  = curIdx - i;
  const r  = rows[i];
  const c  = cols;

  const elapsed = r[c.time] - rows[0][c.time];
  const velMag  = Math.sqrt(r[c.vx]**2 + r[c.vy]**2 + r[c.vz]**2);

  document.getElementById('d-time').textContent  = `T+${elapsed.toFixed(1)} s`;
  document.getElementById('d-alt').textContent   = `${(r[c.alt]/1000).toFixed(1)} km`;
  document.getElementById('d-vel').textContent   = `${(velMag/1000).toFixed(3)} km/s`;
  document.getElementById('d-mass').textContent  = `${r[c.mass].toFixed(1)} kg`;
  document.getElementById('d-tgo').textContent   = `${r[c.tgo].toFixed(1)} s`;
  document.getElementById('d-sma').textContent   = `${(r[c.sma]/1000).toFixed(1)} km`;
  document.getElementById('d-ecc').textContent   = r[c.ecc].toFixed(6);
  document.getElementById('d-inc').textContent   = `${r[c.inc].toFixed(4)}°`;
  document.getElementById('t-elapsed').textContent = `T+${elapsed.toFixed(1)} s`;
  document.getElementById('timeline').value         = i / (rows.length - 1);

  if (tPoints.length > i1) {
    markerMesh.position.lerpVectors(tPoints[i], tPoints[i1], f);
  }
}

// ============================================================
// Animation loop
// ============================================================
function animate(wallTime) {
  requestAnimationFrame(animate);

  if (playing && rows.length > 0) {
    const wallDt = (wallTime - prevWall) / 1000;
    prevWall = wallTime;
    const simDt = wallDt * simSpeed;

    const t0  = rows[0][cols.time];
    const t1  = rows[rows.length - 1][cols.time];
    const dur = t1 - t0;
    const tCur = t0 + (curIdx / (rows.length - 1)) * dur;
    const tNew = Math.min(tCur + simDt, t1);
    curIdx = (tNew - t0) / dur * (rows.length - 1);

    earthBaseRot    += EARTH_ROT_RATE * simDt;
    earth.rotation.y = -MISSION.launchSiteLongitude + earthBaseRot;

    if (curIdx >= rows.length - 1) {
      curIdx  = rows.length - 1;
      playing = false;
      document.getElementById('btn-play').textContent = '▶ PLAY';
      document.getElementById('btn-play').className   = 'btn on';
    }

    refreshDisplay();
  }

  orbit.update();
  renderer.render(scene, camera);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
